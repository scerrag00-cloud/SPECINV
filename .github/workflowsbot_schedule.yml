name: Esegui Macro Picker Bot

on:
  schedule:
    # Esegue lo script alle 08:00 UTC dal lunedì al venerdì.
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # Questo ti permette di avviare lo script anche manualmente con un tasto

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
      
      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Installa dipendenze
        run: pip install -r requirements.txt
        
      - name: Esegui lo script
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python macro_picker.py
